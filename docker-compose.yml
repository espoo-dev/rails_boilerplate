include:
  - backend/docker-compose.yml

services:
  frontend:
    build:
      context: ./frontend
    hostname: frontend-app-container
    ports:
      - "5173:5173"
    environment:
      # The browser (running on the host) talks to the backend via the host
      # port mapping defined in backend/docker-compose.yml (3002 -> 3000).
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3002}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: yarn dev --host 0.0.0.0
    depends_on:
      - web
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
